<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | AX team Progress Report Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; background-image: linear-gradient(180deg, #e0f2fe 0%, #f8fafc 400px); background-repeat: no-repeat; color: #1e293b; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .ms { font-family: 'Material Symbols Outlined'; vertical-align: middle; line-height: 1; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 20px -10px rgba(0, 102, 204, 0.1); }
  .chip { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; user-select: none; }
  .chip-filter { background: #f1f5f9; color: #64748b; }
  .chip-filter.active { background: #0066cc; color: #fff; box-shadow: 0 2px 8px rgba(0, 102, 204, 0.2); }
  .chip-multi { border: 1px solid #e2e8f0; background: #fff; color: #64748b; display: inline-flex; align-items: center; gap: 2px; }
  .chip-multi.selected { background: #f0f9ff; color: #0066cc; border-color: #7dd3fc; }
  #inputDockWrapper { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  #inputDockWrapper.expanded { max-height: 300px; overflow: visible; }
  .compact-input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 600; outline: none; transition: 0.2s; }
  .compact-input:focus { background: #fff; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); }
  .task-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; transition: all 0.2s ease; cursor: pointer; }
  .task-card:hover { border-color: #7dd3fc; box-shadow: 0 4px 12px rgba(0, 102, 204, 0.08); transform: translateY(-1px); }
  .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
  .overlay.active { display: flex; }
  @keyframes pulse-sync { 50% { opacity: 0.4; } }
  .syncing { animation: pulse-sync 1s infinite; }
</style>
</head>
<body>

<header class="sticky-header flex flex-col">
  <div class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 h-12 flex justify-between items-center border-b border-slate-100">
    <div class="flex items-baseline gap-3">
      <h1 class="text-lg font-[900] tracking-tighter text-[#0066cc]">AxPRO</h1>
      <span class="hidden md:inline text-[10px] font-bold text-slate-400">AX team Progress Report Overview</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="settings.html" class="text-slate-400 hover:text-slate-700 transition" title="설정"><span class="ms text-[20px]">settings</span></a>
      <div class="flex items-center gap-1.5" id="statusIndicator">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider hidden sm:inline" id="statusText">Connected</span>
      </div>
      <button onclick="commitToCloud()" class="bg-slate-800 text-white text-[11px] font-bold px-3 py-1.5 rounded-md hover:bg-slate-700 transition flex items-center gap-1">
        <span class="ms text-[14px]">cloud_sync</span> DB 동기화
      </button>
    </div>
  </div>

  <div class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 py-2.5 flex flex-col gap-2.5">
    <div class="flex items-center gap-4 overflow-x-auto pb-1" id="filterArea">
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-[10px] font-black text-slate-400 uppercase">Team</span>
        <div class="flex gap-1" id="teamFilters">
          <div class="chip chip-filter active" onclick="setFilter('team', '전체')">전체</div>
          <div class="chip chip-filter" onclick="setFilter('team', '식품AX')">식품AX</div>
          <div class="chip chip-filter" onclick="setFilter('team', '환경AX')">환경AX</div>
        </div>
      </div>
      <div class="w-[1px] h-4 bg-slate-200 shrink-0"></div>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-[10px] font-black text-slate-400 uppercase">Period</span>
        <div class="flex gap-1" id="periodFilters">
          <div class="chip chip-filter active" onclick="setFilter('period', '전체')">전체</div>
          <div class="chip chip-filter" onclick="setFilter('period', '일간')">일간</div>
          <div class="chip chip-filter" onclick="setFilter('period', '주간')">주간</div>
        </div>
      </div>
      <div class="w-[1px] h-4 bg-slate-200 shrink-0"></div>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-[10px] font-black text-slate-400 uppercase">Member</span>
        <select id="memberFilter" class="compact-input py-0.5 px-2 text-[11px] bg-transparent border-none shrink-0 cursor-pointer" onchange="renderBoard()">
          <option value="전체">전체 멤버</option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-2 overflow-x-auto pb-1 min-h-[30px]">
      <span class="text-[10px] font-black text-slate-400 uppercase shrink-0">Projects</span>
      <div class="flex gap-1.5 shrink-0" id="projectFilters">
        </div>
    </div>
  </div>
</header>

<div class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 pt-4">
  <button onclick="toggleInputDock()" class="flex items-center gap-1.5 text-[#0066cc] bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg text-[12px] font-bold transition w-full sm:w-auto">
    <span class="ms text-[16px] transition-transform duration-300" id="dockIcon">add_circle</span> 새 업무 등록
  </button>

  <div id="inputDockWrapper">
    <div class="bg-white border border-blue-100 rounded-xl p-4 mt-2 shadow-sm">
      <div class="flex flex-col md:flex-row gap-3">
        <div class="flex gap-3 md:w-[280px] shrink-0">
          <input list="dlProjects" id="inProject" class="compact-input flex-1" placeholder="과제명">
          <input list="dlMembers" id="inMember" class="compact-input w-[90px]" placeholder="담당자">
        </div>
        <input type="text" id="inTask" class="compact-input flex-1" placeholder="수행할 업무 내용을 입력하세요... (Enter 등록)" onkeypress="if(event.keyCode==13) addTask()">
        <div class="flex gap-3 shrink-0">
          <select id="inPeriod" class="compact-input w-[80px] cursor-pointer text-center">
            <option value="일간">🔥 일간</option><option value="주간">📅 주간</option>
          </select>
          <button onclick="addTask()" class="bg-[#0066cc] text-white px-5 rounded-lg text-[12px] font-bold hover:bg-blue-700 transition">등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<main class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 py-6 flex flex-col gap-6" id="boardContainer">
  <div class="text-center text-slate-400 font-bold mt-20 opacity-50"><span class="ms text-[40px] block mb-2 animate-spin">sync</span>데이터를 불러오는 중...</div>
</main>

<div class="overlay" id="editModal">
  <div class="bg-white rounded-2xl w-full max-w-[500px] p-6 relative shadow-2xl">
    <button onclick="closeEditModal()" class="absolute top-4 right-4 text-slate-400 hover:text-rose-500 transition"><span class="ms">close</span></button>
    <h3 class="text-[13px] font-black tracking-wider text-slate-800 uppercase mb-5">업무 상세 수정</h3>
    <input type="hidden" id="edId">
    
    <div class="flex gap-3 mb-4">
      <input list="dlProjects" id="edProject" class="compact-input flex-1" placeholder="과제명">
      <input list="dlMembers" id="edMember" class="compact-input w-[100px]" placeholder="담당자">
    </div>
    
    <textarea id="edTask" class="compact-input w-full min-h-[80px] resize-none mb-4" placeholder="내용"></textarea>
    
    <div class="flex gap-3 mb-6">
      <select id="edStatus" class="compact-input flex-1"><option>대기</option><option>진행중</option><option>완료</option><option>보류</option><option>문제발생</option></select>
      <input type="number" id="edProgress" class="compact-input w-[80px] text-center" placeholder="%">
      <select id="edPriority" class="compact-input flex-1"><option>상</option><option>중</option><option>하</option></select>
    </div>

    <div class="flex justify-between items-center pt-4 border-t border-slate-100">
      <button onclick="deleteTask()" class="text-rose-500 text-[12px] font-bold px-2 py-1 hover:bg-rose-50 rounded transition">삭제</button>
      <button onclick="saveEdit()" class="bg-[#0066cc] text-white text-[12px] font-bold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition">저장</button>
    </div>
  </div>
</div>

<datalist id="dlProjects"></datalist>
<datalist id="dlMembers"></datalist>

<form id="hidden_form" target="hidden_iframe" method="POST" style="display:none;"><input type="hidden" name="payload" id="payload_input"></form>
<iframe name="hidden_iframe" style="display:none;" onload="if(window.isSaving) onSaveSuccess();"></iframe>

<script>
  const S_ID = (typeof CONFIG !== 'undefined' && CONFIG.SHEET_ID) ? CONFIG.SHEET_ID : '';
  const A_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_URL) ? CONFIG.API_URL : '';

  let rawData = { members: [], projects: [], tasks: [] };
  let filters = { team: '전체', period: '전체', member: '전체', selectedProjects: new Set() };
  let isDockOpen = false;

  window.onload = async () => {
    if(!S_ID) return alert("config.js에 SHEET_ID가 없습니다.");
    await Promise.all([
      fetchData('members').then(d => rawData.members = d),
      fetchData('projects').then(d => rawData.projects = d),
      fetchData('tasks').then(d => rawData.tasks = d)
    ]);
    
    // 초기 렌더링 세팅
    populateDatalists();
    updateProjectChips();
    renderBoard();
  };

  // 구글 시트 데이터 읽기 (기존 gviz API 활용)
  async function fetchData(sheetName) {
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`);
      return parseCSV(await res.text());
    } catch(e) { console.error(e); return []; }
  }

  function parseCSV(t) {
    const lines=t.trim().split('\n'); if(lines.length<2) return [];
    const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
    return lines.slice(1).map(l=>{
      const v=[]; let c='', q=false;
      for(let i=0; i<l.length; i++){ const ch=l[i]; if(ch==='"') q=!q; else if(ch===','&&!q){v.push(c.trim());c='';} else c+=ch; }
      v.push(c.trim()); const o={}; hdrs.forEach((h,i)=>o[h]=(v[i]||'').replace(/^"|"$/g,'')); return o;
    }).filter(row => Object.values(row).some(val => val !== '')); // 빈 줄 제거
  }

  // 1. 초기 UI 데이터 채우기 (자동완성 및 멤버 콤보박스)
  function populateDatalists() {
    const projHTML = rawData.projects.map(p => `<option value="${p.short_name}">`).join('');
    document.getElementById('dlProjects').innerHTML = projHTML;
    
    const memHTML = rawData.members.map(m => `<option value="${m.name}">`).join('');
    document.getElementById('dlMembers').innerHTML = memHTML;
    
    const memSelectHTML = `<option value="전체">전체 멤버</option>` + rawData.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
    document.getElementById('memberFilter').innerHTML = memSelectHTML;
  }

  // 2. 필터 클릭 로직
  function setFilter(type, value) {
    filters[type] = value;
    // UI 업데이트
    const parent = type === 'team' ? document.getElementById('teamFilters') : document.getElementById('periodFilters');
    parent.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    
    if(type === 'team') updateProjectChips();
    renderBoard();
  }

  function toggleProjectChip(projName, chipElement) {
    chipElement.classList.toggle('selected');
    const icon = chipElement.querySelector('.ms');
    if (filters.selectedProjects.has(projName)) {
      filters.selectedProjects.delete(projName);
      if(icon) icon.remove();
    } else {
      filters.selectedProjects.add(projName);
      if(!icon) chipElement.insertAdjacentHTML('afterbegin', '<span class="ms text-[14px]">check</span>');
    }
    renderBoard();
  }

  function updateProjectChips() {
    filters.selectedProjects.clear();
    const targetProjs = filters.team === '전체' ? rawData.projects : rawData.projects.filter(p => p.team === filters.team);
    
    document.getElementById('projectFilters').innerHTML = targetProjs.map(p => {
      filters.selectedProjects.add(p.short_name); // 기본으로 모두 선택
      return `<button class="chip chip-multi selected" onclick="toggleProjectChip('${p.short_name}', this)">
                <span class="ms text-[14px]">check</span> ${p.short_name}
              </button>`;
    }).join('');
  }

  // 3. 메인 보드 렌더링
  function renderBoard() {
    const container = document.getElementById('boardContainer');
    filters.member = document.getElementById('memberFilter').value;

    // 데이터 필터링
    const filteredTasks = rawData.tasks.filter(t => {
      if(filters.period !== '전체' && t.period !== filters.period) return false;
      if(filters.member !== '전체' && t.member_name !== filters.member) return false;
      if(filters.selectedProjects.size > 0 && !filters.selectedProjects.has(t.project_short)) return false;
      return true;
    });

    // 과제별 그룹화
    const grouped = {};
    filters.selectedProjects.forEach(proj => grouped[proj] = []); // 빈 과제도 섹션은 보이도록
    filteredTasks.forEach(t => {
      if(grouped[t.project_short] !== undefined) grouped[t.project_short].push(t);
    });

    if(Object.keys(grouped).length === 0) {
      container.innerHTML = `<div class="text-center text-slate-400 font-bold mt-20 opacity-50">해당 조건의 과제가 없습니다.</div>`;
      return;
    }

    container.innerHTML = Object.keys(grouped).map(projName => {
      const projInfo = rawData.projects.find(p => p.short_name === projName) || {};
      const tList = grouped[projName];
      const dailyTasks = tList.filter(t => t.period === '일간');
      const weeklyTasks = tList.filter(t => t.period === '주간');
      
      return `
      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 lg:p-6">
        <div class="flex items-center gap-2 mb-4 pb-3 border-b border-slate-100">
          <span class="bg-blue-50 text-[#0066cc] text-[10px] font-black px-1.5 py-0.5 rounded">${projInfo.team || '미분류'}</span>
          <h2 class="text-lg font-bold text-slate-800 leading-none">${projName}</h2>
          <span class="text-[12px] text-slate-400 font-medium hidden sm:inline ml-1">- ${projInfo.full_name || ''}</span>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-8">
          <div class="flex flex-col gap-2.5">
            <div class="text-[11px] font-black text-rose-500 uppercase flex items-center gap-1"><span class="ms text-[14px]">local_fire_department</span> Daily Focus</div>
            ${dailyTasks.length ? dailyTasks.map(t => generateTaskCard(t)).join('') : '<div class="text-[12px] text-slate-400 py-2">없음</div>'}
          </div>
          <div class="flex flex-col gap-2.5 lg:border-l lg:border-slate-100 lg:pl-8">
            <div class="text-[11px] font-black text-[#0066cc] uppercase flex items-center gap-1"><span class="ms text-[14px]">calendar_today</span> Weekly Flow</div>
            ${weeklyTasks.length ? weeklyTasks.map(t => generateTaskCard(t)).join('') : '<div class="text-[12px] text-slate-400 py-2">없음</div>'}
          </div>
        </div>
      </section>`;
    }).join('');
  }

  function generateTaskCard(t) {
    const pColor = t.priority === '상' ? 'text-rose-600 bg-rose-50' : (t.priority === '중' ? 'text-slate-500 bg-slate-100' : 'text-slate-400 bg-slate-50');
    const sColor = t.status === '완료' ? 'text-slate-400 bg-slate-100' : (t.status === '진행중' ? 'text-blue-600 bg-blue-50' : 'text-emerald-600 bg-emerald-50');
    
    return `
    <div class="task-card" onclick="openEditModal('${t.id}')">
      <div class="flex justify-between items-start gap-2 mb-1.5">
        <p class="text-[13px] font-semibold text-slate-700 leading-snug">${t.content}</p>
        <span class="${pColor} text-[10px] font-bold px-1.5 py-0.5 rounded shrink-0">${t.priority}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="bg-slate-100 text-slate-600 text-[10px] font-bold px-1.5 py-0.5 rounded">${t.member_name}</span>
        ${t.progress ? `<div class="flex-1 max-w-[60px] h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${t.progress}%"></div></div><span class="text-[10px] font-bold text-slate-400">${t.progress}%</span>` : ''}
        <span class="ml-auto text-[10px] font-black ${sColor} px-1.5 py-0.5 rounded">${t.status}</span>
      </div>
    </div>`;
  }

  // 4. 입력/수정/삭제 및 동기화
  function toggleInputDock() {
    const dock = document.getElementById('inputDockWrapper');
    isDockOpen = !isDockOpen;
    dock.classList.toggle('expanded');
    document.getElementById('dockIcon').style.transform = isDockOpen ? "rotate(45deg)" : "rotate(0deg)";
    if (isDockOpen) document.getElementById('inProject').focus();
  }

  function addTask() {
    const proj = document.getElementById('inProject').value.trim();
    const mem = document.getElementById('inMember').value.trim();
    const task = document.getElementById('inTask').value.trim();
    
    if(!proj || !task) return alert("과제명과 업무 내용을 입력하세요.");
    
    const newTask = {
      id: 'T-' + Date.now(), project_short: proj, member_name: mem, content: task,
      period: document.getElementById('inPeriod').value, status: '대기', progress: 0, priority: '중',
      last_updated: new Date().toISOString()
    };
    
    rawData.tasks.push(newTask);
    document.getElementById('inProject').value = ''; 
    document.getElementById('inTask').value = '';
    
    renderBoard(); commitToCloud();
  }

  function openEditModal(id) {
    const t = rawData.tasks.find(x => x.id === id);
    if(!t) return;
    document.getElementById('edId').value = t.id;
    document.getElementById('edProject').value = t.project_short;
    document.getElementById('edMember').value = t.member_name;
    document.getElementById('edTask').value = t.content;
    document.getElementById('edStatus').value = t.status || '대기';
    document.getElementById('edProgress').value = t.progress || 0;
    document.getElementById('edPriority').value = t.priority || '중';
    document.getElementById('editModal').classList.add('active');
  }

  function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }

  function saveEdit() {
    const id = document.getElementById('edId').value;
    const idx = rawData.tasks.findIndex(x => x.id === id);
    if(idx > -1) {
      rawData.tasks[idx] = {
        id: id,
        project_short: document.getElementById('edProject').value,
        member_name: document.getElementById('edMember').value,
        content: document.getElementById('edTask').value,
        period: rawData.tasks[idx].period, // period는 폼에 없으므로 유지
        status: document.getElementById('edStatus').value,
        progress: document.getElementById('edProgress').value,
        priority: document.getElementById('edPriority').value,
        last_updated: new Date().toISOString()
      };
      closeEditModal(); renderBoard(); commitToCloud();
    }
  }

  function deleteTask() {
    if(!confirm("이 업무를 삭제하시겠습니까?")) return;
    const id = document.getElementById('edId').value;
    rawData.tasks = rawData.tasks.filter(x => x.id !== id);
    closeEditModal(); renderBoard(); commitToCloud();
  }

  function commitToCloud() {
    if(!A_URL) return alert('API 주소가 설정되지 않았습니다.');
    if(window.isSaving) return;
    window.isSaving = true;

    // 시각적 피드백
    document.getElementById('statusIndicator').querySelector('div').classList.replace('bg-emerald-500', 'bg-blue-500');
    document.getElementById('statusIndicator').querySelector('div').classList.add('syncing');
    document.getElementById('statusText').textContent = "Syncing...";

    const payload = { action: 'write', sheetName: 'tasks', data: rawData.tasks };
    document.getElementById('payload_input').value = JSON.stringify(payload);
    document.getElementById('hidden_form').action = A_URL;
    document.getElementById('hidden_form').submit();
  }

  function onSaveSuccess() {
    window.isSaving = false;
    document.getElementById('statusIndicator').querySelector('div').classList.replace('bg-blue-500', 'bg-emerald-500');
    document.getElementById('statusIndicator').querySelector('div').classList.remove('syncing');
    document.getElementById('statusText').textContent = "Connected";
  }

  function manualSync() { commitToCloud(); }
  window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); manualSync(); } });

</script>
</body>
</html>

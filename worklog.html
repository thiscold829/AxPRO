<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | 나의 기록 조회</title>
<style>
  :root{ --brand:#0066cc; --ink:#151a22; --muted:#8a909c; --line:#e7e9ef; --bg:#f2f4f8; --card:#fff;
    --wait:#94a0b0; --prog:#0066cc; --prob:#ef3e36; --hold:#f59e0b; --done:#22b573; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
  button{ font-family:inherit; cursor:pointer; border:0; } a{ text-decoration:none; color:inherit; }
  .ic{ display:inline-block; vertical-align:-.18em; width:18px; height:18px; flex:none; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  .topbar{ flex:none; display:flex; align-items:center; gap:14px; padding:11px 22px; background:#fff; border-bottom:1px solid var(--line); }
  .brand{ font-size:19px; font-weight:900; letter-spacing:-.03em; color:var(--brand); }
  .ttl{ font-size:14px; font-weight:800; } .ttl .g{ color:var(--muted); font-weight:700; font-size:12.5px; }
  .grow{ flex:1; }
  .who{ font-size:12.5px; font-weight:700; color:var(--muted); }
  .backbtn{ display:inline-flex; align-items:center; gap:6px; background:#151a22; color:#fff; font-size:12.5px; font-weight:800; padding:8px 15px; border-radius:9px; } .backbtn:hover{ background:#2a2f3a; }
  .iconbtn{ color:var(--muted); background:transparent; padding:5px; border-radius:8px; } .iconbtn:hover{ color:var(--brand); background:#eef2f8; }

  .toolbar{ flex:none; background:#fff; border-bottom:1px solid var(--line); padding:12px 22px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .seg{ display:inline-flex; background:#eef1f6; border-radius:9px; padding:3px; gap:2px; }
  .seg button{ background:transparent; color:var(--muted); font-size:12.5px; font-weight:800; padding:6px 14px; border-radius:7px; }
  .seg button.on{ background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .drange{ display:inline-flex; align-items:center; gap:6px; }
  .drange input{ border:1px solid var(--line); background:#fff; border-radius:8px; font-family:inherit; font-size:12.5px; font-weight:700; padding:6px 8px; color:var(--ink); outline:0; }
  .drange span{ color:var(--muted); font-weight:800; }
  .quick{ display:inline-flex; gap:4px; }
  .quick button{ font-size:11.5px; font-weight:800; color:var(--muted); background:#f1f3f7; border-radius:7px; padding:6px 10px; } .quick button:hover{ color:var(--brand); } .quick button.on{ background:var(--brand); color:#fff; }
  .lbl{ font-size:10.5px; font-weight:900; color:var(--muted); letter-spacing:.05em; }
  .copybtn{ display:inline-flex; align-items:center; gap:6px; background:#151a22; color:#fff; font-size:12px; font-weight:800; padding:7px 13px; border-radius:8px; } .copybtn:hover{ background:#2a2f3a; }

  .projbar{ flex:none; background:#fafbfd; border-bottom:1px solid var(--line); padding:9px 22px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ppill{ font-size:11.5px; font-weight:800; color:var(--muted); background:#eef1f6; border-radius:99px; padding:5px 12px; cursor:pointer; border:1.5px solid transparent; } .ppill:hover{ color:var(--brand); }
  .ppill.on{ background:#eaf2fd; color:var(--brand); border-color:var(--brand); }

  .body{ flex:1; overflow:auto; padding:20px 22px 60px; }
  .body::-webkit-scrollbar{ width:9px;height:9px; } .body::-webkit-scrollbar-thumb{ background:#cdd2db;border-radius:10px; }
  .wrap{ max-width:900px; margin:0 auto; }
  .summary{ font-size:12.5px; font-weight:700; color:var(--muted); margin-bottom:14px; } .summary b{ color:var(--ink); }

  .daycard{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px 20px 8px; margin-bottom:14px; box-shadow:0 2px 10px -6px rgba(0,0,0,.08); }
  .dayhead{ display:flex; align-items:baseline; gap:10px; padding-bottom:10px; margin-bottom:10px; border-bottom:2px solid var(--ink); }
  .daydate{ font-size:15px; font-weight:900; } .daydate .dow{ color:var(--muted); font-weight:700; font-size:12.5px; }
  .daycount{ margin-left:auto; font-size:11.5px; font-weight:800; color:var(--muted); }
  .pgrp{ margin-bottom:12px; }
  .ptag{ display:inline-block; font-size:12px; font-weight:900; color:var(--brand); background:#eaf2fd; padding:3px 11px; border-radius:7px; margin-bottom:5px; }
  .pf{ font-size:11px; color:var(--muted); font-weight:600; margin-left:6px; }
  .line{ display:flex; align-items:flex-start; gap:9px; padding:5px 2px 5px 6px; }
  .ltxt{ flex:1; font-size:13.5px; font-weight:600; line-height:1.55; color:#2a2f3a; min-width:0; }
  .ltxt.done{ color:#aeb4be; text-decoration:line-through; }
  .lnote{ font-size:11.5px; color:var(--muted); font-weight:500; }
  .lmeta{ display:flex; align-items:center; gap:7px; flex:none; padding-top:2px; }
  .lddl{ font-size:10.5px; font-weight:800; color:#8a909c; } .lddl.od{ color:var(--prob); font-weight:900; }
  .lprog{ font-size:10.5px; font-weight:800; color:var(--muted); }
  .stbadge{ font-size:10px; font-weight:900; padding:2px 7px; border-radius:6px; white-space:nowrap; }
  .empty{ text-align:center; color:var(--muted); font-weight:700; padding:70px 20px; }

  #toast{ position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:11px 22px; border-radius:99px; font-size:13px; font-weight:700; opacity:0; transition:.35s; z-index:400; box-shadow:0 10px 24px rgba(0,0,0,.18); pointer-events:none; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(6px); }
  #setupNotice{ display:none; text-align:center; color:var(--muted); font-weight:700; padding:70px 20px; }

  @media (prefers-color-scheme:dark){
    :root{ --ink:#eef1f6; --muted:#8b93a3; --line:#282c36; --bg:#0c0e13; --card:#161922; }
    .topbar,.toolbar,.daycard{ background:#161922; } .projbar,.body{ background:#0c0e13; }
    .seg,.ppill,.quick button,.drange input{ background:#20242e; color:#eef1f6; }
    .seg button.on{ background:#2c313d; } .drange input{ border-color:#282c36; }
    .ptag,.ppill.on{ background:rgba(0,102,204,.16); color:#7dd3fc; }
  }
  @media (max-width:820px){
    body{ height:auto; min-height:100vh; overflow:auto; }
    .topbar,.toolbar,.projbar{ flex-wrap:wrap; gap:10px 12px; }
    .body{ overflow:visible; }
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-arrow_back" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></symbol>
  <symbol id="i-edit_note" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></symbol>
  <symbol id="i-content_copy" viewBox="0 0 24 24"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></symbol>
</defs></svg>

<div class="topbar">
  <span class="brand">AxPRO</span>
  <span class="ttl">나의 기록 조회 <span class="g">· 내 업무일지</span></span>
  <span class="grow"></span>
  <span class="who" id="whoLbl"></span>
  <a href="app.html" class="backbtn"><svg class="ic" style="width:15px;height:15px"><use href="#i-arrow_back"/></svg> 보드로</a>
  <button class="iconbtn" title="로그아웃" onclick="AX.logout();location.replace('index.html')"><svg class="ic"><use href="#i-logout"/></svg></button>
</div>

<div class="toolbar">
  <span class="seg" id="kindSeg">
    <button class="on" onclick="setKind('일간',this)">일간</button>
    <button onclick="setKind('주간',this)">주간</button>
  </span>
  <span class="drange">
    <input type="date" id="fStart" onchange="onRange()">
    <span>~</span>
    <input type="date" id="fEnd" onchange="onRange()">
  </span>
  <span class="quick" id="quick">
    <button onclick="quickRange('today',this)">오늘</button>
    <button onclick="quickRange('week',this)">이번주</button>
    <button class="on" onclick="quickRange('month',this)">이번달</button>
    <button onclick="quickRange('all',this)">전체</button>
  </span>
  <span class="grow"></span>
  <button class="copybtn" onclick="copyJournal()"><svg class="ic" style="width:14px;height:14px"><use href="#i-content_copy"/></svg> 일지 복사</button>
</div>

<div class="projbar" id="projBar"><span class="lbl">사업</span><span id="projPills"></span></div>

<div class="body">
  <div class="wrap">
    <div class="summary" id="summary"></div>
    <div id="timeline"></div>
    <div id="setupNotice">⚠ 서버 설정이 필요합니다. (config.js 의 API_URL)</div>
  </div>
</div>

<div id="toast"></div>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
  if(!AX.requireAuth()){ throw 'no-auth'; }
  const ME=(AX.user()||{}).name||'';
  const cu=AX.user()||{};

  const STATUS=['대기','진행중','완료','보류','문제발생'];
  const STCOLOR={대기:'#94a0b0',진행중:'#0066cc',완료:'#22b573',보류:'#f59e0b',문제발생:'#ef3e36'};
  const STBG={대기:'#eef1f5',진행중:'#eaf2fd',완료:'#e6f7ef',보류:'#fdf2e0',문제발생:'#fdeceb'};
  const order={문제발생:0,진행중:1,보류:2,대기:3,완료:4};

  let entries=[], projects=[];
  let kind='일간', fStart='', fEnd='', selProjs=[];

  function pad(n){return(n<10?'0':'')+n;}
  function today(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function fromStr(s){var p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function toStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function addD(s,n){var d=fromStr(s);d.setDate(d.getDate()+n);return toStr(d);}
  function weekMon(s){var d=fromStr(s);var D=(d.getDay()+6)%7;d.setDate(d.getDate()-D);return toStr(d);}
  const TODAY=today();
  const DOW=['일','월','화','수','목','금','토'];
  function dow(s){ try{ return DOW[fromStr(s).getDay()]; }catch(e){ return ''; } }
  function fmtDate(s){ return String(s).replace(/-/g,'.'); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function projFull(sh){ var p=projects.find(x=>x.short_name===sh); return p?(p.full_name||''):''; }

  AX.onStatus(function(){});   // 상태 리스너(무해)

  window.onload=init;
  async function init(){
    document.getElementById('whoLbl').textContent=`${cu.dept||''} ${ME} ${cu.rank||''}`.trim();
    quickRange('month');   // 기본: 이번달
    var c=AX.cached(['entries','projects']);
    if(c.hasCache){ apply(c.data); render(); }
    let res;
    try{ res=await AX.pull(['entries','projects']); }catch(e){ res={data:{},fromCache:true,hasCache:false}; }
    if(!res.fromCache){ apply(res.data); render(); }
    else if(!c.hasCache){ apply(res.data); render(); if(!res.hasCache && !AX.configured){ document.getElementById('setupNotice').style.display='block'; } }
  }
  function apply(data){
    entries=(data.entries||[]).filter(t=>t.deleted!==true && t.deleted!=='TRUE' && t.member===ME)
      .map(t=>{ t.progress=(t.progress===''||t.progress==null)?0:+t.progress; return t; });
    projects=(data.projects||[]).filter(p=>p.deleted!==true && p.deleted!=='TRUE').sort((a,b)=>(+a.order||999)-(+b.order||999));
  }

  function inRange(d){ if(fStart && d<fStart) return false; if(fEnd && d>fEnd) return false; return true; }
  function filtered(){ return entries.filter(t=>t.kind===kind && inRange(t.date) && (selProjs.length===0||selProjs.includes(t.project))); }

  function setKind(v,b){ kind=v; selProjs=[]; document.querySelectorAll('#kindSeg button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); render(); }
  function onRange(){ fStart=document.getElementById('fStart').value; fEnd=document.getElementById('fEnd').value; document.querySelectorAll('#quick button').forEach(x=>x.classList.remove('on')); render(); }
  function quickRange(k,b){
    if(k==='today'){ fStart=TODAY; fEnd=TODAY; }
    else if(k==='week'){ fStart=weekMon(TODAY); fEnd=addD(fStart,6); }
    else if(k==='month'){ fStart=TODAY.slice(0,8)+'01'; fEnd=TODAY; }
    else { fStart=''; fEnd=''; }
    document.getElementById('fStart').value=fStart; document.getElementById('fEnd').value=fEnd;
    document.querySelectorAll('#quick button').forEach(x=>x.classList.remove('on'));
    if(b) b.classList.add('on');
    else { var m={today:0,week:1,month:2,all:3}; var btns=document.querySelectorAll('#quick button'); if(btns[m[k]]) btns[m[k]].classList.add('on'); }
    render();
  }
  function toggleProj(p){ var i=selProjs.indexOf(p); if(i>-1) selProjs.splice(i,1); else selProjs.push(p); renderPills(); render(); }

  function renderPills(){
    var kinds=entries.filter(t=>t.kind===kind && inRange(t.date));
    var uniq=[...new Set(kinds.map(t=>t.project))];
    selProjs=selProjs.filter(p=>uniq.includes(p));   // 현재 보이는 사업에 없는 선택은 정리(빈 화면 방지)
    var ordered=projects.filter(p=>uniq.includes(p.short_name)).map(p=>p.short_name);
    uniq.forEach(u=>{ if(!ordered.includes(u)) ordered.push(u); });
    document.getElementById('projBar').style.display = ordered.length?'flex':'none';
    document.getElementById('projPills').innerHTML = ordered.map(p=>`<span class="ppill ${selProjs.includes(p)?'on':''}" onclick="toggleProj('${esc(p)}')" title="${esc(projFull(p))}">${esc(p)}</span>`).join('');
  }

  function lineRow(t){
    var done=t.status==='완료';
    var od=t.deadline && String(t.deadline).length>=10 && t.deadline<TODAY && !done;
    return `<div class="line">
      <span class="ltxt ${done?'done':''}">${esc(t.content)}${t.note?` <span class="lnote">(${esc(t.note)})</span>`:''}</span>
      <span class="lmeta">
        ${t.deadline?`<span class="lddl ${od?'od':''}">~${esc(ddl(t.deadline))}</span>`:''}
        <span class="lprog">${t.progress}%</span>
        <span class="stbadge" style="color:${STCOLOR[t.status]||'#8a909c'};background:${STBG[t.status]||'#eef1f5'}">${esc(t.status||'')}</span>
      </span></div>`;
  }
  function ddl(d){ return String(d).length>=10 ? String(d).slice(5).replace('-','.') : String(d); }

  function dayCard(d, logs){
    var byP={}; logs.forEach(t=>{(byP[t.project]=byP[t.project]||[]).push(t);});
    var ordered=projects.filter(p=>byP[p.short_name]).map(p=>p.short_name);
    Object.keys(byP).forEach(k=>{ if(!ordered.includes(k)) ordered.push(k); });
    var inner='';
    ordered.forEach(pr=>{
      inner+=`<div class="pgrp"><span class="ptag">${esc(pr)}</span><span class="pf">${esc(projFull(pr))}</span>`+
        byP[pr].slice().sort((a,b)=>(order[a.status]??9)-(order[b.status]??9)).map(lineRow).join('')+`</div>`;
    });
    var label = kind==='주간' ? (fmtDate(d)+' ~ '+fmtDate(addD(d,4))+' 주') : (fmtDate(d)+' <span class="dow">('+dow(d)+')</span>');
    return `<div class="daycard"><div class="dayhead"><span class="daydate">${label}</span><span class="daycount">${logs.length}건</span></div>${inner}</div>`;
  }

  function render(){
    renderPills();
    var list=filtered();
    var tl=document.getElementById('timeline');
    var dates=[...new Set(list.map(t=>t.date))].sort((a,b)=>b.localeCompare(a));
    document.getElementById('summary').innerHTML = `<b>${list.length}</b>건 · ${dates.length}${kind==='주간'?'주':'일'} · <b>${esc(ME)}</b>${fStart||fEnd?` · ${fStart?fmtDate(fStart):'처음'} ~ ${fEnd?fmtDate(fEnd):'끝'}`:''}`;
    if(!list.length){ tl.innerHTML='<div class="empty">해당 기간·사업에 기록이 없습니다.</div>'; return; }
    tl.innerHTML = dates.map(d=>dayCard(d, list.filter(t=>t.date===d))).join('');
  }

  function buildText(){
    var list=filtered();
    var dates=[...new Set(list.map(t=>t.date))].sort((a,b)=>b.localeCompare(a));
    var txt='';
    dates.forEach(d=>{
      txt += kind==='주간' ? `[${fmtDate(d)} ~ ${fmtDate(addD(d,4))} 주]\n` : `[${fmtDate(d)} (${dow(d)})]\n`;
      var day=list.filter(t=>t.date===d);
      var byP={}; day.forEach(t=>{(byP[t.project]=byP[t.project]||[]).push(t);});
      var ordered=projects.filter(p=>byP[p.short_name]).map(p=>p.short_name);
      Object.keys(byP).forEach(k=>{ if(!ordered.includes(k)) ordered.push(k); });
      ordered.forEach(pr=>{ txt+='['+pr+']\n'; byP[pr].forEach(t=>{ txt+='- '+t.content+(t.note?' ('+t.note+')':'')+'\n'; }); });
      txt+='\n';
    });
    return txt.trim();
  }
  function copyJournal(){
    var txt=buildText();
    if(!txt){ return toast('복사할 기록이 없습니다.'); }
    (navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject()).then(()=>toast('일지를 클립보드에 복사했습니다.')).catch(()=>{
      var ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); toast('일지를 복사했습니다.'); }catch(e){ toast('복사 실패'); } ta.remove();
    });
  }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2400); }
</script>
</body>
</html>
